name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4 # version from packageManager in package.json
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      # Shipped configs staying parseable (the schema-compatibility promise) is
      # covered by test/config.test.ts in the suite above.
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Build only — publishing/signing is the release pipeline, which lands later.
      - run: docker build -t endclose-relay:ci .
