name: Prepare release

# Stage 1 of the release flow: bump the version everywhere it lives and open a
# release PR. Merging that PR triggers tag-release.yml (stage 2), which tags main and
# thereby fires release.yml (build, publish to both registries, create the Distr
# version).
#
# Authenticates as the endclose-release GitHub App (vars.RELEASE_APP_ID +
# secrets.RELEASE_APP_PRIVATE_KEY): a short-lived installation token is minted per
# run, the PR is authored by the app bot (so either maintainer can approve it), and —
# unlike the default GITHUB_TOKEN, whose events never trigger other workflows — app
# tokens fire CI on the PR and the release on the tag.
# The default GITHUB_TOKEN is read-only here; all pushes/PRs use the app token.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Bump versions
        id: bump
        run: |
          VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version) # prints vX.Y.Z
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Quick-start compose pins the GHCR image tag; the release gate enforces
          # that it matches, so bump it here too.
          sed -i "s|ghcr.io/end-close/relay:v[0-9][0-9.]*|ghcr.io/end-close/relay:$VERSION|" docker-compose.yaml
          grep -q "ghcr.io/end-close/relay:$VERSION" docker-compose.yaml
      - name: Open release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "endclose-release[bot]"
          git config user.email "endclose-release[bot]@users.noreply.github.com"
          git checkout -b "release/$VERSION"
          git commit -am "Release $VERSION"
          git push -u origin "release/$VERSION"
          gh pr create --base main --head "release/$VERSION" \
            --title "Release $VERSION" \
            --body "$(printf 'Bumps package.json and the quick-start compose image to %s.\n\nMerging this PR tags main as %s, which publishes the image to registry.distr.sh and ghcr.io and creates the Distr application version (customers approve rollout in their portal).' "$VERSION" "$VERSION")"
