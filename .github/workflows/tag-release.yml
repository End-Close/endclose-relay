name: Tag release

# Stage 2: when a release/* PR (from prepare-release.yml) merges, tag main with the
# version now in package.json. The tag push — made with the endclose-release GitHub
# App's token so it triggers workflows — fires release.yml, which builds and publishes.
# The default GITHUB_TOKEN is read-only here; the tag push uses the app token.
permissions:
  contents: read

on:
  pull_request:
    types: [closed]

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Tag main with the merged version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/$VERSION" > /dev/null; then
            echo "tag $VERSION already exists — nothing to do"
            exit 0
          fi
          git config user.name "endclose-release[bot]"
          git config user.email "endclose-release[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "pushed $VERSION — release.yml takes it from here"
