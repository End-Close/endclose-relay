# endclose-relay configuration (first-boot seed)
#
# This file is read ONCE, when the appliance database is empty, to seed the initial
# configuration. After that the config lives in the appliance database (on the data
# volume, versioned) and is managed in the admin UI at :8081 — where you can also
# export the active config back to YAML at any time.
#
# Secrets are never written in this file — every secret is referenced by the name of an
# environment variable (set them in .env next to docker-compose.yaml).
#
# Required env vars:
#   ENDCLOSE_API_KEY        End Close API key (issued per appliance, environment-scoped)
#   PAYABLI_WEBHOOK_SECRET  The exact header value you configure on the Payabli
#                           notification via webHeaderParameters, e.g. "Bearer <random>"
#   RELAY_DATA_KEY          32+ chars; encrypts buffered payloads at rest (AES-256-GCM)
#   MASKING_HMAC_KEY        32+ chars; keys the deterministic `hash` transform.
#                           Never leaves this appliance.
#   ADMIN_BASIC_AUTH        user:password protecting the admin UI/API (required)
#
# The `map` block of each route is the complete answer to "what leaves our network":
# only fields named there are forwarded, ever. Paths are dot notation into the payload
# (batchId, batch.id, transactions.*.id). Fields can be transformed, e.g.
#   customer_email: { source: CustomerEmail, transform: [trim, lowercase, hash] }
# (transforms apply in order; hash is a keyed HMAC so End Close can match values it
# never sees raw). Preview any route locally with:
#   relayctl map preview --route <id> --sample <payload.json>

endclose:
  base_url: https://api.endclose.com/v1
  api_key_env: ENDCLOSE_API_KEY

ingest:
  port: 8443
  host: 0.0.0.0

routes:
  # ── Payabli: settlement funded ──────────────────────────────────────────────
  # Payabli notification: payout_batch_settlement_funded  (payload Event: TransferFunded)
  - id: payabli-settlements
    source: payabli
    auth:
      mode: static_header
      header: authorization
      secret_env: PAYABLI_WEBHOOK_SECRET
      allowed_ips:
        - 54.166.54.170 # Payabli production egress IP (sandbox: 52.3.204.115)
    events: ["TransferFunded"]
    map:
      data_stream_key: payabli_settlements_funded
      external_id: transferId
      amount: NetAmount # string dollars; converted to integer cents
      direction: credit
      date: { source: transferTime, format: mdy_hms } # Payabli sends "M/D/YYYY H:mm:ss"
      metadata:
        batch_id: batchId
        batch_number: batchNumber
        total_amount: TotalAmount
        return_amount: RtAmount
        entry_point: entryPoint
        paypoint: Paypoint

  # ── Payabli: batch paid ─────────────────────────────────────────────────────
  # Payabli notification: payout_batch_paid  (payload Event: PayOutBatchPaid)
  - id: payabli-batches
    source: payabli
    auth:
      mode: static_header
      header: authorization
      secret_env: PAYABLI_WEBHOOK_SECRET
      allowed_ips:
        - 54.166.54.170
    events: ["PayOutBatchPaid"]
    map:
      data_stream_key: payabli_batches_paid
      external_id: BatchId
      amount: TotalAmount
      direction: debit
      # No date: this payload carries no timestamp, so the record is dated by receive time.
      metadata:
        method: Method
        entry_point: entryPoint
        paypoint: Paypoint
